const scene = new THREE.Scene();
let W = window.innerWidth, H = window.innerHeight;
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);

const R = 1.0;
const pivot = new THREE.Group();
scene.add(pivot);

function ll(lat, lng, r) {
  const phi   = (90 - lat)  * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function makeCurve(a, b, extraLift) {
  const n1 = ll(CITIES[a].lat, CITIES[a].lng, 1).normalize();
  const n2 = ll(CITIES[b].lat, CITIES[b].lng, 1).normalize();
  const dot = Math.max(-1, Math.min(1, n1.dot(n2)));
  const ang = Math.acos(dot);
  const hover = R * (extraLift ? 1.032 : 1.018);
  const STEPS = 80;
  const points = [];
  for (let i = 0; i <= STEPS; i++) {
    const t = i / STEPS;
    let dir;
    if (ang < 0.001) {
      dir = n1.clone();
    } else {
      const s = Math.sin(ang);
      dir = n1.clone().multiplyScalar(Math.sin((1-t)*ang)/s)
               .add(n2.clone().multiplyScalar(Math.sin(t*ang)/s))
               .normalize();
    }
    points.push(dir.multiplyScalar(hover));
  }
  return new THREE.CatmullRomCurve3(points);
}

function makeLabel(cityName, countryName, isRed) {
  const canvas = document.createElement('canvas');
  canvas.width  = 256;
  canvas.height = 56;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 56);
  const color = isRed ? '#ff5555' : '#ffffff';
  const dim   = isRed ? 'rgba(255,120,120,0.55)' : 'rgba(255,255,255,0.45)';
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = color;
  ctx.fillText(cityName, 0, 24);
  ctx.font = '17px monospace';
  ctx.fillStyle = dim;
  ctx.fillText(countryName, 0, 46);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0.85, depthWrite:false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.38, 0.085, 1);
  return sprite;
}

async function init() {
  const bar = document.getElementById('loading-bar');
  bar.style.width = '25%';

  const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/land-50m.json');
  bar.style.width = '60%';
  const land = topojson.feature(world, world.objects.land);

  const CW=2048, CH=1024;
  const tc = document.createElement('canvas');
  tc.width=CW; tc.height=CH;
  const ctx2 = tc.getContext('2d');
  ctx2.fillStyle='#040404'; ctx2.fillRect(0,0,CW,CH);
  const proj = d3.geoEquirectangular().scale(CW/(2*Math.PI)).translate([CW/2,CH/2]);
  const path = d3.geoPath(proj, ctx2);
  ctx2.fillStyle='#111111'; ctx2.beginPath(); path(land); ctx2.fill();
  ctx2.strokeStyle='#1e1e1e'; ctx2.lineWidth=1.0; ctx2.beginPath(); path(land); ctx2.stroke();

  pivot.add(new THREE.Mesh(
    new THREE.SphereGeometry(R,72,72),
    new THREE.MeshBasicMaterial({ map:new THREE.CanvasTexture(tc) })
  ));
  pivot.add(new THREE.Mesh(
    new THREE.SphereGeometry(R*1.001,36,36),
    new THREE.MeshBasicMaterial({ color:0x181818, wireframe:true, transparent:true, opacity:0.07 })
  ));

  bar.style.width = '80%';

  const arcGroup  = new THREE.Group();
  const arcCurves = [];
  CONNECTIONS.forEach(([a,b]) => {
    const curve = makeCurve(a, b, false);
    arcCurves.push(curve);
    arcGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(curve.getPoints(80)),
      new THREE.LineBasicMaterial({ color:0x1d1d1d, transparent:true, opacity:0.9 })
    ));
  });
  pivot.add(arcGroup);

  const redArcGroup = new THREE.Group();
  const redCurves   = [];
  INDONESIAN_CONNECTIONS.forEach(([a,b]) => {
    const curve = makeCurve(a, b, true);
    redCurves.push(curve);
    redArcGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(curve.getPoints(80)),
      new THREE.LineBasicMaterial({ color:0xcc2020, transparent:true, opacity:0.80 })
    ));
  });
  pivot.add(redArcGroup);

  const nodeGroup  = new THREE.Group();
  const labelGroup = new THREE.Group();

  CITIES.forEach((c, i) => {
    const isRed = INDONESIAN_CONNECTIONS.some(([a,b]) => a===i || b===i);
    const col   = isRed ? 0xff4444 : 0xffffff;
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(0.020,8,8),
      new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity: isRed ? 0.20 : 0.10 })
    );
    glow.position.copy(ll(c.lat, c.lng, R*1.012));
    nodeGroup.add(glow);
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.009,8,8),
      new THREE.MeshBasicMaterial({ color:col })
    );
    dot.position.copy(ll(c.lat, c.lng, R*1.013));
    nodeGroup.add(dot);
    const sprite = makeLabel(c.city, c.country, isRed);
    sprite.position.copy(ll(c.lat, c.lng, R*1.10));
    labelGroup.add(sprite);
  });

  pivot.add(nodeGroup);
  pivot.add(labelGroup);

  const travelGroup = new THREE.Group();
  pivot.add(travelGroup);
  const travellers  = [];

  function spawnTraveller(forceRed) {
    const isRed  = forceRed || (Math.random() < 0.30);
    const curves = isRed ? redCurves : arcCurves;
    if (!curves.length) return;
    const idx      = Math.floor(Math.random() * curves.length);
    const reversed = Math.random() < 0.5;
    const mesh     = new THREE.Mesh(
      new THREE.SphereGeometry(isRed ? 0.020 : 0.015, 6,6),
      new THREE.MeshBasicMaterial({ color: isRed ? 0xff3333 : 0xffffff, transparent:true, opacity:0 })
    );
    travelGroup.add(mesh);
    travellers.push({ curve:curves[idx], reversed, mesh, t:0,
      speed:(isRed ? 0.0035 : 0.004) + Math.random()*0.005, isRed });
  }

  for (let i=0; i<28; i++) { spawnTraveller(false); travellers[travellers.length-1].t=Math.random(); }
  for (let i=0; i<8;  i++) { spawnTraveller(true);  travellers[travellers.length-1].t=Math.random(); }

  bar.style.width='100%';
  await new Promise(r=>setTimeout(r,250));
  const loader=document.getElementById('loading');
  loader.style.opacity='0';
  setTimeout(()=>loader.style.display='none', 700);

  let isDragging=false, prevX=0, prevY=0, velX=0, velY=0, autoSpin=true;

  renderer.domElement.addEventListener('mousedown', e=>{
    isDragging=true; prevX=e.clientX; prevY=e.clientY; autoSpin=false;
  });
  window.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    velY+=(e.clientX-prevX)*0.005; velX+=(e.clientY-prevY)*0.004;
    prevX=e.clientX; prevY=e.clientY;
  });
  window.addEventListener('mouseup', ()=>{ isDragging=false; setTimeout(()=>autoSpin=true,2500); });
  renderer.domElement.addEventListener('wheel', e=>{
    camera.position.z=Math.max(1.6,Math.min(6.5,camera.position.z+e.deltaY*0.003));
  },{ passive:true });

  let tStart=null, pinchDist0=null, camZ0=null;
  renderer.domElement.addEventListener('touchstart', e=>{
    e.preventDefault();
    if(e.touches.length===1){ tStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; isDragging=true; autoSpin=false; }
    else if(e.touches.length===2){
      pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      camZ0=camera.position.z;
    }
  },{passive:false});
  renderer.domElement.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(e.touches.length===1&&tStart){
      velY+=(e.touches[0].clientX-tStart.x)*0.005; velX+=(e.touches[0].clientY-tStart.y)*0.004;
      tStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2&&pinchDist0!==null){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      camera.position.z=Math.max(1.6,Math.min(6.5,camZ0*(pinchDist0/d)));
    }
  },{passive:false});
  renderer.domElement.addEventListener('touchend',()=>{ isDragging=false; setTimeout(()=>autoSpin=true,2500); });

  function animate() {
    requestAnimationFrame(animate);
    if(autoSpin) velY+=0.00038;
    velX*=0.90; velY*=0.90;
    pivot.rotation.y+=velY;
    pivot.rotation.x=Math.max(-0.85,Math.min(0.85,pivot.rotation.x+velX));
    const camDist = camera.position.z;
    const labelScale = camDist * 0.115;
    labelGroup.children.forEach(s => s.scale.set(labelScale, labelScale*0.22, 1));
    for(let i=travellers.length-1; i>=0; i--){
      const tr=travellers[i];
      tr.t+=tr.speed;
      const p=tr.reversed?1.0-Math.min(tr.t,1.0):Math.min(tr.t,1.0);
      tr.mesh.position.copy(tr.curve.getPoint(p));
      const fade=tr.t<0.08?tr.t/0.08:tr.t>0.92?(1.0-tr.t)/0.08:1.0;
      tr.mesh.material.opacity=Math.max(0,Math.min(1,fade));
      if(tr.t>=1.06){
        travelGroup.remove(tr.mesh);
        tr.mesh.geometry.dispose(); tr.mesh.material.dispose();
        travellers.splice(i,1);
        spawnTraveller(false);
      }
    }
    renderer.render(scene, camera);
  }
  animate();
}

init().catch(err=>{
  document.getElementById('loading-text').textContent='FAILED — CHECK INTERNET';
  console.error(err);
});

window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});
</script>
</body>
</html>
